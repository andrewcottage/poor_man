- title: Cinnamon Sugar Yeast Doughnuts
  slug: cinnamon-sugar-yeast-doughnuts
  category_slug: dessert
  blurb: >-
    Pillowy homemade doughnuts finished in cinnamon sugar, with a soft interior and a bakery-style edge.
  prep_time: 150
  difficulty: 3
  servings: 8
  cost: 9.75
  tags:
    - dessert
    - doughnuts
    - baking
    - weekend
    - sweet
  image_path: db/seeds/images/recipes/cinnamon-sugar-yeast-doughnuts.jpeg
  image_prompt: >-
    An ultra-detailed bakery-style photograph of fresh cinnamon sugar doughnuts stacked on parchment,
    with visible sugar crystals, warm tones, and premium editorial lighting.
  ingredients:
    - quantity: "3/4"
      unit: cup
      name: whole milk
      notes: warm
    - quantity: "2 1/4"
      unit: teaspoons
      name: active dry yeast
    - quantity: "1/4"
      unit: cup
      name: granulated sugar
    - quantity: "2"
      unit: ""
      name: large eggs
    - quantity: "4"
      unit: tablespoons
      name: unsalted butter
      notes: melted
    - quantity: "3 1/4"
      unit: cups
      name: all-purpose flour
    - quantity: "1/2"
      unit: teaspoon
      name: kosher salt
    - quantity: "4"
      unit: cups
      name: neutral oil
      notes: for frying
    - quantity: "1/2"
      unit: cup
      name: granulated sugar
      notes: for coating
    - quantity: "2"
      unit: teaspoons
      name: ground cinnamon
  instructions:
    - Combine the warm milk, yeast, and sugar in a large bowl and let the mixture stand until foamy.
    - Whisk in the eggs and melted butter, then stir in the flour and salt until a soft dough forms.
    - Knead until smooth, let the dough rise until doubled, then roll it out and cut rounds with holes in the center.
    - Let the shaped doughnuts puff again while the oil heats to 350 degrees Fahrenheit, then fry until golden on both sides.
    - Toss the warm doughnuts in the cinnamon sugar mixture and serve the same day.
