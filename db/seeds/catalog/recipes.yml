- title: Blueberry Buttermilk Pancakes
  slug: blueberry-buttermilk-pancakes
  category_slug: breakfast
  blurb: >-
    Fluffy buttermilk pancakes packed with blueberries and lemon zest, made for slow mornings
    and stacked high with maple syrup.
  prep_time: 25
  difficulty: 1
  servings: 4
  cost: 11.5
  tags:
    - breakfast
    - pancakes
    - blueberries
    - weekend
    - vegetarian
  image_path: db/seeds/images/recipes/blueberry-buttermilk-pancakes.jpeg
  image_prompt: >-
    A super high-quality editorial food photo of a tall stack of blueberry buttermilk pancakes
    with melting butter, glossy maple syrup, fresh blueberries, lemon zest, and soft morning light.
  ingredients:
    - quantity: "2"
      unit: cups
      name: all-purpose flour
    - quantity: "2"
      unit: tablespoons
      name: granulated sugar
    - quantity: "2"
      unit: teaspoons
      name: baking powder
    - quantity: "1/2"
      unit: teaspoon
      name: baking soda
    - quantity: "1/2"
      unit: teaspoon
      name: kosher salt
    - quantity: "2"
      unit: cups
      name: buttermilk
    - quantity: "2"
      unit: ""
      name: large eggs
    - quantity: "4"
      unit: tablespoons
      name: unsalted butter
      notes: melted, plus more for the pan
    - quantity: "1"
      unit: teaspoon
      name: vanilla extract
    - quantity: "1"
      unit: tablespoon
      name: lemon zest
    - quantity: "1"
      unit: cup
      name: blueberries
    - quantity: "1/4"
      unit: cup
      name: maple syrup
      notes: for serving
  instructions:
    - In a large bowl, whisk together the flour, sugar, baking powder, baking soda, and salt so the dry mix is evenly combined.
    - In a second bowl, whisk the buttermilk, eggs, melted butter, vanilla, and lemon zest until smooth.
    - Pour the wet mixture into the dry ingredients and stir just until no dry streaks remain, then fold in the blueberries without overmixing.
    - Heat a buttered skillet or griddle over medium heat and cook the batter in 1/3-cup portions until bubbles form, then flip and cook until the pancakes are deeply golden on both sides.
    - Keep the finished pancakes warm while you cook the rest, then stack and serve with maple syrup and extra blueberries.

